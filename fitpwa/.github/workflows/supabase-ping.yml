name: Supabase Auto-Ping

on:
  schedule:
    # Run at 08:00 UTC every 5 days (e.g. 1st, 6th, 11th, etc.)
    - cron: '0 8 */5 * *'
  # Allow running manually from the Actions tab
  workflow_dispatch:

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to prevent project pause
        run: |
          curl -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
          "${{ secrets.SUPABASE_URL }}/rest/v1/"